<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>LinguaReader – читалка з перекладом та звуком</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Світла тема */
        body.light {
            background: linear-gradient(145deg, #d9cdb0 0%, #c7b891 100%);
            color: #2c2b28;
        }
        body.light .book-page {
            background: #fffcf5;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.4);
            color: #2c2b28;
        }
        body.light .sidebar {
            background: #fefaf2;
            color: #2c2b28;
        }
        body.light .control-btn, body.light .file-label {
            background: #e6d5bd;
            color: #4f3a24;
        }

        /* Темна тема */
        body.dark {
            background: #1a1a1a;
            color: #e0e0e0;
        }
        body.dark .book-page {
            background: #2a2a2a;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.8);
            color: #e0e0e0;
        }
        body.dark .sidebar {
            background: #2a2a2a;
            color: #e0e0e0;
            border: 1px solid #444;
        }
        body.dark .control-btn, body.dark .file-label {
            background: #3a3a3a;
            color: #f0f0f0;
        }
        body.dark .vocab-item, body.dark .book-item {
            background: #333;
            border-color: #555;
        }
        body.dark .vocab-word {
            background: #444;
            color: #ffecb3;
        }
        body.dark .word-highlight {
            background-color: #6b4e2e !important;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            padding: 16px;
            min-height: 100vh;
            transition: background 0.2s, color 0.2s;
        }

        /* Хедер з логотипом */
        .app-header {
            max-width: 1400px;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            padding: 0 8px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo {
            font-size: 2.2rem;
            background: #e6d5bd;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .site-title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #5d3a1a, #a87b4a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }
        body.dark .site-title {
            background: linear-gradient(135deg, #e6c99c, #f5e2b9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .font-controls {
            display: flex;
            gap: 8px;
            background: rgba(230, 213, 189, 0.5);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 60px;
        }
        .font-controls button {
            background: #e6d5bd;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s;
        }
        .font-controls button:active {
            transform: scale(0.95);
        }
        body.dark .font-controls button {
            background: #4a4a4a;
            color: white;
        }

        .reader-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            position: relative;
        }

        .book-area {
            flex: 3;
            min-width: 260px;
        }

        /* Єдина сторінка для всіх пристроїв */
        .book-page {
            display: block;
            border-radius: 24px;
            padding: 1.5rem;
            font-family: 'Merriweather', 'Georgia', serif;
            font-size: 1rem;
            line-height: 1.6;
            text-align: justify;
            transition: font-size 0.1s ease;
            min-height: 500px;
            max-height: 70vh;
            overflow-y: auto;
        }

        /* Адаптація для телефону */
        @media (max-width: 700px) {
            body { padding: 8px; }
            .app-header { margin-bottom: 12px; }
            .logo { width: 40px; height: 40px; font-size: 1.8rem; }
            .site-title { font-size: 1.2rem; }
            .book-page { padding: 1rem; min-height: 400px; }
            .control-btn, .file-label { padding: 8px 16px; font-size: 0.85rem; }
            .font-controls button { padding: 4px 10px; font-size: 1rem; }
        }

        .word {
            display: inline-block;
            cursor: pointer;
            border-radius: 8px;
            padding: 0 2px;
            margin: 0 -2px;
            font-weight: 500;
            touch-action: manipulation;
        }
        .word:hover {
            background-color: #f3e9da;
        }
        .word:active {
            background-color: #ffecb3;
            transform: scale(0.99);
        }
        .word-highlight {
            background-color: #ffecb3 !important;
            box-shadow: 0 2px 8px rgba(255, 193, 7, 0.3);
        }

        .book-page img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0.8rem auto;
            border-radius: 12px;
        }

        .pagination-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .control-btn, .file-label {
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            touch-action: manipulation;
            display: inline-block;
            text-align: center;
        }
        .control-btn:hover, .file-label:hover {
            transform: translateY(-2px);
            filter: brightness(0.97);
        }
        .control-btn:active, .file-label:active {
            transform: scale(0.96);
        }
        .page-indicator {
            background: rgba(255,245,230,0.9);
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.85rem;
        }
        body.dark .page-indicator {
            background: #3a3a3a;
            color: #ddd;
        }

        /* Бічна панель */
        .sidebar {
            flex: 1;
            min-width: 260px;
            background: #fefaf2;
            border-radius: 32px;
            padding: 1rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        @media (max-width: 800px) {
            .sidebar {
                position: fixed;
                top: 0;
                right: -280px;
                width: 280px;
                height: 100%;
                z-index: 1000;
                border-radius: 0;
                overflow-y: auto;
                transition: right 0.3s;
                box-shadow: -5px 0 20px rgba(0,0,0,0.3);
            }
            .sidebar.open {
                right: 0;
            }
            .sidebar-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.5);
                z-index: 999;
                display: none;
            }
            .sidebar-overlay.open {
                display: block;
            }
            .mobile-menu-btn {
                display: inline-block;
                background: #e6d5bd;
                border: none;
                padding: 8px 16px;
                border-radius: 40px;
                font-size: 0.9rem;
                margin-bottom: 8px;
            }
        }
        @media (min-width: 801px) {
            .mobile-menu-btn, .sidebar-overlay {
                display: none;
            }
        }

        .vocab-list, .books-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 0.5rem;
        }
        .vocab-item, .book-item {
            margin: 8px 0;
            padding: 8px;
            border-radius: 24px;
            border: 1px solid #efe2d2;
        }
        .vocab-word {
            font-weight: 700;
            background: #f9efdf;
            padding: 4px 10px;
            border-radius: 40px;
            cursor: pointer;
            display: inline-block;
            font-size: 0.85rem;
        }
        .icon-btn {
            background: transparent;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 30px;
        }
        .upload-area {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
            justify-content: center;
        }
        input[type="file"] { display: none; }

        /* Тултіп біля слова */
        .word-tooltip {
            position: fixed;
            background: #1f1c18e6;
            backdrop-filter: blur(12px);
            color: #fffaee;
            padding: 8px 16px;
            border-radius: 48px;
            font-size: 0.85rem;
            z-index: 2000;
            pointer-events: none;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 8px 20px black;
            border: 1px solid #d4af7a;
            white-space: nowrap;
            max-width: 80vw;
            white-space: normal;
            word-break: break-word;
            text-align: center;
        }
        .word-tooltip::before {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 10px solid #1f1c18e6;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
        }
        .word-tooltip.bottom-arrow::before {
            top: auto;
            bottom: -10px;
            border-bottom: none;
            border-top: 10px solid #1f1c18e6;
        }

        .toast-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c2b28e6;
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 16px;
            border-radius: 60px;
            z-index: 2100;
            font-size: 0.8rem;
            text-align: center;
            pointer-events: none;
        }
        h2 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }
        .info-note {
            font-size: 0.65rem;
            margin-top: 16px;
            color: #ad8e62;
        }
    </style>
</head>
<body class="light">
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="app-header">
    <div class="logo-area">
        <div class="logo">📖</div>
        <div class="site-title">LinguaReader</div>
    </div>
    <div class="header-controls">
        <div class="font-controls">
            <button id="decreaseFontBtn" aria-label="Зменшити шрифт">A−</button>
            <button id="increaseFontBtn" aria-label="Збільшити шрифт">A+</button>
        </div>
        <button id="themeToggleBtn" class="control-btn">🌙 Нічний режим</button>
        <button id="mobileMenuBtn" class="mobile-menu-btn control-btn">📚 Словник</button>
    </div>
</div>

<div class="reader-wrapper">
    <div class="book-area">
        <!-- Єдина сторінка для всіх пристроїв -->
        <div class="book-page" id="bookPage"></div>
        
        <div class="pagination-controls">
            <button id="prevPageBtn" class="control-btn">◀ Попередня сторінка</button>
            <span id="pageIndicator" class="page-indicator">Сторінка 0 / 0</span>
            <button id="nextPageBtn" class="control-btn">Наступна сторінка ▶</button>
        </div>
        <div class="upload-area">
            <label class="file-label" for="uploadBook">📂 Завантажити книгу</label>
            <input type="file" id="uploadBook" accept=".epub,.fb2,.pdf,.txt">
            <button id="soundToggleBtn" class="control-btn">🔊 Звук</button>
            <button id="lastWordBtn" class="control-btn">📍 Останнє слово</button>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div>
            <h2>📚 Мій словничок</h2>
            <button id="clearVocabBtn" style="background:#eedfcb; border:none; padding:4px 10px; border-radius:40px;">🗑 Очистити</button>
            <button id="toggleAllWordsBtn" style="background:#eedfcb; border:none; padding:4px 10px; border-radius:40px; margin-left:8px;">📋 Всі слова</button>
            <ul id="vocabularyList" class="vocab-list">
                <li style="color:#b59773;">📖 Натисніть на слово</li>
            </ul>
        </div>
        <div>
            <h2>📂 Мої книги</h2>
            <ul id="booksList" class="books-list">
                <li style="color:#b59773;">📭 Список завантажених книг</li>
            </ul>
            <div class="info-note">
                💡 Торкніться/клікніть на слово → переклад + звук (підказка біля слова).<br>
                👆 Гортайте кнопками або стрілками на клавіатурі.<br>
                🔤 Кнопки A+ / A− змінюють розмір шрифту.
            </div>
        </div>
    </div>
</div>

<script>
    // ------------------- ГЛОБАЛЬНІ ЗМІННІ -------------------
    let allPages = [];
    let currentPage = 0;
    let vocabularyHistory = [];
    let translationCache = new Map();
    let soundEnabled = true;
    let currentUtterance = null;
    let showAllWords = false;
    let lastWordText = null;
    let lastWordPage = -1;
    let uploadedBooks = [];
    let isDarkTheme = false;
    let currentFontSize = 1.0;

    // DOM елементи
    const bookPageDiv = document.getElementById('bookPage');
    const prevBtn = document.getElementById('prevPageBtn');
    const nextBtn = document.getElementById('nextPageBtn');
    const pageIndicator = document.getElementById('pageIndicator');
    const vocabListUl = document.getElementById('vocabularyList');
    const booksListUl = document.getElementById('booksList');
    const fileInput = document.getElementById('uploadBook');
    const soundToggleBtn = document.getElementById('soundToggleBtn');
    const clearVocabBtn = document.getElementById('clearVocabBtn');
    const toggleAllWordsBtn = document.getElementById('toggleAllWordsBtn');
    const lastWordBtn = document.getElementById('lastWordBtn');
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const increaseFontBtn = document.getElementById('increaseFontBtn');
    const decreaseFontBtn = document.getElementById('decreaseFontBtn');

    let tooltip = null;
    let tooltipTimeout = null;
    let currentTooltipWord = null;
    let touchStartX = 0;
    let touchEndX = 0;

    // ------------------- РОЗМІР ШРИФТУ -------------------
    function updateFontSize() {
        const textContainer = document.querySelector('.book-page');
        if (textContainer) {
            textContainer.style.fontSize = currentFontSize + 'rem';
        }
        localStorage.setItem('readerFontSize', currentFontSize);
        if (tooltip && tooltip.style.display === 'block' && currentTooltipWord) {
            positionTooltip(currentTooltipWord);
        }
    }
    function increaseFont() {
        if (currentFontSize < 2.2) {
            currentFontSize += 0.1;
            updateFontSize();
        } else showToast("Максимальний розмір шрифту");
    }
    function decreaseFont() {
        if (currentFontSize > 0.7) {
            currentFontSize -= 0.1;
            updateFontSize();
        } else showToast("Мінімальний розмір шрифту");
    }

    // ------------------- ТЕМА -------------------
    function setTheme(dark) {
        isDarkTheme = dark;
        if (dark) {
            document.body.classList.remove('light');
            document.body.classList.add('dark');
            themeToggleBtn.innerHTML = '☀️ Світла тема';
        } else {
            document.body.classList.remove('dark');
            document.body.classList.add('light');
            themeToggleBtn.innerHTML = '🌙 Нічний режим';
        }
        localStorage.setItem('darkTheme', dark);
    }
    function toggleTheme() { setTheme(!isDarkTheme); }

    // ------------------- ДОПОМІЖНІ -------------------
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showToast(msg, duration = 2000) {
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
    }

    function splitHtmlIntoPages(html, maxBlocksPerPage = 7) {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        const blocks = [];
        const nodes = Array.from(tempDiv.childNodes);
        for (let node of nodes) {
            if (node.nodeType === Node.TEXT_NODE && node.textContent.trim()) {
                const paragraphs = node.textContent.split(/\n\s*\n/);
                for (let p of paragraphs) if (p.trim()) blocks.push(`<p>${p.trim()}</p>`);
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                if (node.tagName === 'IMG') blocks.push(node.outerHTML);
                else blocks.push(node.outerHTML);
            }
        }
        const pages = [];
        for (let i = 0; i < blocks.length; i += maxBlocksPerPage) {
            pages.push(blocks.slice(i, i + maxBlocksPerPage).join(''));
        }
        if (pages.length === 0) pages.push('<p>✨ Сторінка порожня</p>');
        return pages;
    }

    function wrapWordsInHtml(html) {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        function walk(node) {
            if (node.nodeType === Node.TEXT_NODE) {
                const words = node.textContent.split(/(\b[a-zA-Z']+\b)/g);
                const frag = document.createDocumentFragment();
                for (let part of words) {
                    if (part.match(/^[a-zA-Z']+$/)) {
                        const span = document.createElement('span');
                        span.className = 'word';
                        span.textContent = part;
                        frag.appendChild(span);
                    } else {
                        frag.appendChild(document.createTextNode(part));
                    }
                }
                node.parentNode.replaceChild(frag, node);
            } else if (node.nodeType === Node.ELEMENT_NODE && node.tagName !== 'IMG' && node.tagName !== 'SCRIPT') {
                Array.from(node.childNodes).forEach(walk);
            }
        }
        walk(tempDiv);
        return tempDiv.innerHTML;
    }

    function showTooltip(wordElement, text, autoHide = true) {
        if (!tooltip) {
            tooltip = document.createElement('div');
            tooltip.className = 'word-tooltip';
            document.body.appendChild(tooltip);
        }
        if (tooltipTimeout) clearTimeout(tooltipTimeout);
        tooltip.innerText = text;
        tooltip.style.display = 'block';
        currentTooltipWord = wordElement;
        positionTooltip(wordElement);
        if (autoHide) {
            tooltipTimeout = setTimeout(() => {
                tooltip.style.display = 'none';
                currentTooltipWord = null;
            }, 3000);
        }
    }

    function positionTooltip(wordElement) {
        if (!tooltip || tooltip.style.display !== 'block') return;
        const rect = wordElement.getBoundingClientRect();
        const tooltipRect = tooltip.getBoundingClientRect();
        let top = rect.top - tooltipRect.height - 10;
        let arrowClass = '';
        if (top < 10) {
            top = rect.bottom + 10;
            arrowClass = 'bottom-arrow';
        }
        tooltip.classList.remove('bottom-arrow');
        if (arrowClass === 'bottom-arrow') tooltip.classList.add('bottom-arrow');
        let left = rect.left + (rect.width / 2) - (tooltipRect.width / 2);
        left = Math.max(8, Math.min(left, window.innerWidth - tooltipRect.width - 8));
        tooltip.style.top = `${top}px`;
        tooltip.style.left = `${left}px`;
    }

    function hideTooltip() {
        if (tooltip) tooltip.style.display = 'none';
        if (tooltipTimeout) clearTimeout(tooltipTimeout);
        currentTooltipWord = null;
    }

    function render() {
        if (!allPages.length) {
            bookPageDiv.innerHTML = '<p style="text-align:center;">📘 Завантажте книгу</p>';
            pageIndicator.innerText = `Сторінка 0 / 0`;
            return;
        }

        const pageHtml = wrapWordsInHtml(allPages[currentPage]);
        bookPageDiv.innerHTML = pageHtml;
        pageIndicator.innerText = `Сторінка ${currentPage+1} / ${allPages.length}`;
        attachListeners();
    }

    function attachListeners() {
        const words = document.querySelectorAll('#bookPage .word');
        words.forEach(span => {
            span.removeEventListener('click', wordClickHandler);
            span.addEventListener('click', wordClickHandler);
        });
    }

    async function wordClickHandler(e) {
        const span = e.currentTarget;
        const word = span.innerText.trim();
        if (!word || !word.match(/^[a-zA-Z']+$/)) return;
        showTooltip(span, `⏳ ${word}...`, false);
        let translation = await fetchTranslation(word);
        if (translation.includes("❓") || translation.includes("помилка")) translation = `❓ (немає перекладу)`;
        showTooltip(span, `${word} → ${translation}`, true);
        addOrUpdateWord(word, translation);
        if (soundEnabled) speakWord(word);
        span.classList.add('word-highlight');
        setTimeout(() => span.classList.remove('word-highlight'), 500);
        lastWordText = word;
        lastWordPage = currentPage;
        localStorage.setItem('lastWord', word);
        localStorage.setItem('lastWordPage', currentPage);
    }

    function nextPage() {
        if (currentPage + 1 < allPages.length) {
            currentPage++;
            render();
            hideTooltip();
        } else showToast("Це остання сторінка");
    }

    function prevPage() {
        if (currentPage - 1 >= 0) {
            currentPage--;
            render();
            hideTooltip();
        } else showToast("Це перша сторінка");
    }

    function handleTouchStart(e) { touchStartX = e.changedTouches[0].screenX; }
    function handleTouchEnd(e) {
        touchEndX = e.changedTouches[0].screenX;
        const delta = touchEndX - touchStartX;
        if (Math.abs(delta) > 50) {
            if (delta > 0) prevPage();
            else nextPage();
        }
    }

    function handleKeyPress(e) {
        if (e.key === 'ArrowLeft') {
            prevPage();
            e.preventDefault();
        } else if (e.key === 'ArrowRight') {
            nextPage();
            e.preventDefault();
        }
    }

    function goToLastWord() {
        if (!lastWordText || lastWordPage === -1) {
            showToast("⚠️ Немає останнього слова. Натисніть на будь-яке слово.");
            return;
        }
        if (lastWordPage >= allPages.length) {
            showToast("Слово більше не в книзі");
            return;
        }
        if (currentPage !== lastWordPage) {
            currentPage = lastWordPage;
            render();
            setTimeout(() => highlightWord(lastWordText), 200);
        } else {
            highlightWord(lastWordText);
        }
    }

    function highlightWord(word) {
        const spans = document.querySelectorAll('#bookPage .word');
        for (let span of spans) {
            if (span.innerText === word) {
                span.scrollIntoView({ behavior: 'smooth', block: 'center' });
                span.classList.add('word-highlight');
                setTimeout(() => span.classList.remove('word-highlight'), 1500);
                break;
            }
        }
    }

    async function fetchTranslation(word) {
        const lower = word.toLowerCase();
        if (translationCache.has(lower)) return translationCache.get(lower);
        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=uk&dt=t&q=${encodeURIComponent(word)}`;
            const resp = await fetch(url);
            const data = await resp.json();
            if (data && data[0] && data[0][0] && data[0][0][0]) {
                let trans = data[0][0][0];
                translationCache.set(lower, trans);
                return trans;
            }
        } catch(e) {}
        try {
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|uk`;
            const resp = await fetch(url);
            const data = await resp.json();
            let trans = data?.responseData?.translatedText;
            if (!trans || trans === word) trans = "❓ (немає перекладу)";
            translationCache.set(lower, trans);
            return trans;
        } catch(e) { return "⚠️ помилка перекладу"; }
    }

    function speakWord(word) {
        if (!soundEnabled || !window.speechSynthesis) return;
        if (currentUtterance) window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(word);
        utter.lang = 'en-US';
        utter.rate = 0.9;
        window.speechSynthesis.speak(utter);
        currentUtterance = utter;
    }

    function toggleSound() {
        soundEnabled = !soundEnabled;
        soundToggleBtn.innerHTML = soundEnabled ? '🔊 Звук' : '🔇 Звук';
        if (!soundEnabled && window.speechSynthesis) window.speechSynthesis.cancel();
        localStorage.setItem('soundEnabled', soundEnabled);
    }

    function saveVocabulary() { localStorage.setItem('reader_vocabulary', JSON.stringify(vocabularyHistory)); }
    function loadVocabulary() {
        const saved = localStorage.getItem('reader_vocabulary');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (Array.isArray(parsed)) vocabularyHistory = parsed;
                translationCache.clear();
                for (let item of vocabularyHistory) {
                    if (item.translation && !item.translation.includes("❓"))
                        translationCache.set(item.word.toLowerCase(), item.translation);
                }
            } catch(e) {}
        }
        renderVocabularyList();
    }

    function addOrUpdateWord(word, translation) {
        const idx = vocabularyHistory.findIndex(i => i.word.toLowerCase() === word.toLowerCase());
        if (idx !== -1) {
            vocabularyHistory[idx].translation = translation;
            const item = vocabularyHistory.splice(idx, 1)[0];
            vocabularyHistory.unshift(item);
        } else {
            vocabularyHistory.unshift({ word, translation });
        }
        translationCache.set(word.toLowerCase(), translation);
        saveVocabulary();
        renderVocabularyList();
    }

    function renderVocabularyList() {
        if (!vocabListUl) return;
        let items = showAllWords ? vocabularyHistory : (vocabularyHistory.length ? [vocabularyHistory[0]] : []);
        if (items.length === 0) {
            vocabListUl.innerHTML = '<li style="color:#b59773;">📖 Натисніть на слово</li>';
            return;
        }
        vocabListUl.innerHTML = items.map((item, i) => `
            <li class="vocab-item" data-word="${escapeHtml(item.word)}">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px;">
                    <span class="vocab-word" data-word="${escapeHtml(item.word)}">${escapeHtml(item.word)}</span>
                    <span style="font-size:0.8rem;">${escapeHtml(item.translation)}</span>
                    <button class="icon-btn retry-vocab" data-word="${escapeHtml(item.word)}">🔄</button>
                    <button class="icon-btn remove-vocab" data-word="${escapeHtml(item.word)}">🗑️</button>
                </div>
            </li>
        `).join('');
        document.querySelectorAll('.vocab-word').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const w = el.getAttribute('data-word');
                const trans = el.parentElement.children[1]?.innerText || '';
                showToast(`${w} → ${trans}`);
            });
        });
        document.querySelectorAll('.retry-vocab').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const w = btn.getAttribute('data-word');
                const newTrans = await fetchTranslation(w);
                addOrUpdateWord(w, newTrans);
                renderVocabularyList();
                showToast(`Переклад "${w}" оновлено`);
            });
        });
        document.querySelectorAll('.remove-vocab').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const w = btn.getAttribute('data-word');
                vocabularyHistory = vocabularyHistory.filter(v => v.word !== w);
                translationCache.delete(w.toLowerCase());
                saveVocabulary();
                renderVocabularyList();
                showToast(`"${w}" видалено`);
            });
        });
    }

    function clearVocabulary() {
        vocabularyHistory = [];
        translationCache.clear();
        saveVocabulary();
        renderVocabularyList();
        showToast("Словник очищено");
    }

    function toggleShowAllWords() {
        showAllWords = !showAllWords;
        toggleAllWordsBtn.innerHTML = showAllWords ? '📋 Показати лише останнє' : '📋 Всі слова';
        renderVocabularyList();
    }

    async function parseEpubWithImages(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = async (e) => {
                const arrayBuffer = e.target.result;
                const book = ePub(arrayBuffer);
                await book.ready;
                const spine = book.spine;
                const sections = spine.spineItems;
                let fullHtml = '';
                for (let i = 0; i < sections.length; i++) {
                    const section = sections[i];
                    const doc = await section.load(book.load.bind(book));
                    const body = doc.querySelector('body');
                    if (body) {
                        const clone = body.cloneNode(true);
                        const imgs = clone.querySelectorAll('img');
                        for (let img of imgs) {
                            const src = img.getAttribute('src');
                            if (src && !src.startsWith('data:') && !src.startsWith('blob:')) {
                                try {
                                    const blob = await book.resources.get(src);
                                    if (blob) img.setAttribute('src', URL.createObjectURL(blob));
                                } catch(err) { console.warn("img error", src); }
                            }
                        }
                        fullHtml += clone.innerHTML + '<hr class="epub-split">';
                    }
                    section.unload();
                }
                resolve(fullHtml);
            };
            reader.onerror = reject;
            reader.readAsArrayBuffer(file);
        });
    }

    async function parseFb2WithImages(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const xml = e.target.result;
                const parser = new DOMParser();
                const doc = parser.parseFromString(xml, 'text/xml');
                const body = doc.querySelector('body');
                if (!body) { reject("Немає body"); return; }
                let html = '';
                const images = doc.querySelectorAll('binary');
                const map = new Map();
                for (let img of images) {
                    const id = img.getAttribute('id');
                    const data = img.textContent;
                    if (id && data) {
                        const mime = img.getAttribute('content-type') || 'image/jpeg';
                        const blob = new Blob([Uint8Array.from(atob(data), c => c.charCodeAt(0))], { type: mime });
                        map.set(id, URL.createObjectURL(blob));
                    }
                }
                function process(node) {
                    if (node.nodeType === Node.ELEMENT_NODE) {
                        if (node.tagName === 'image' && node.getAttribute('href')) {
                            const href = node.getAttribute('href').replace('#', '');
                            if (map.has(href)) html += `<img src="${map.get(href)}" style="max-width:100%; margin:1rem auto;">`;
                            return;
                        }
                        if (node.tagName === 'p') {
                            html += '<p>';
                            node.childNodes.forEach(process);
                            html += '</p>';
                            return;
                        }
                        node.childNodes.forEach(process);
                    } else if (node.nodeType === Node.TEXT_NODE) {
                        html += node.textContent;
                    }
                }
                body.childNodes.forEach(process);
                resolve(html);
            };
            reader.onerror = reject;
            reader.readAsText(file, 'utf-8');
        });
    }

    async function parsePdfTextOnly(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = async (e) => {
                const arrayBuffer = e.target.result;
                const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
                const pdf = await loadingTask.promise;
                let fullText = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    const pageText = content.items.map(item => item.str).join(' ');
                    fullText += `<p>${pageText}</p>`;
                }
                resolve(fullText);
            };
            reader.onerror = reject;
            reader.readAsArrayBuffer(file);
        });
    }

    async function loadBookFromFile(file) {
        const ext = file.name.split('.').pop().toLowerCase();
        let htmlContent = "";
        showToast("Обробка книги...");
        try {
            if (ext === 'epub') htmlContent = await parseEpubWithImages(file);
            else if (ext === 'fb2') htmlContent = await parseFb2WithImages(file);
            else if (ext === 'pdf') htmlContent = await parsePdfTextOnly(file);
            else if (ext === 'txt') {
                const text = await new Promise((res, rej) => {
                    const r = new FileReader();
                    r.onload = e => res(e.target.result);
                    r.onerror = rej;
                    r.readAsText(file, 'UTF-8');
                });
                htmlContent = `<p>${text.replace(/\n/g, '</p><p>')}</p>`;
            } else throw new Error("Формат не підтримується");
            if (!htmlContent.trim()) htmlContent = "<p>⚠️ Не вдалося витягнути текст</p>";
            const bookId = Date.now() + '-' + Math.random().toString(36).substr(2,6);
            uploadedBooks.unshift({ id: bookId, name: file.name, content: htmlContent });
            localStorage.setItem('reader_books', JSON.stringify(uploadedBooks));
            renderBooksList();
            loadBook(htmlContent);
        } catch(err) {
            console.error(err);
            showToast("Помилка: " + err.message);
        }
    }

    function loadBook(html) {
        allPages = splitHtmlIntoPages(html, 7);
        currentPage = 0;
        render();
        localStorage.setItem('reader_current_book', html);
        lastWordText = null;
        lastWordPage = -1;
        localStorage.removeItem('lastWord');
        localStorage.removeItem('lastWordPage');
        showToast("Книгу завантажено");
    }

    function loadDefaultBook() {
        const defaultHtml = `
            <h2>The Lost Key</h2>
            <p>Sam is a boy. He lives in a small house near the forest. One sunny morning, Sam finds an old key under a big tree. The key is gold and very beautiful.</p>
            <p>"What does this key open?" Sam asks himself.</p>
            <img src="https://placehold.co/600x400/F5E6D3/7A5A3A?text=Magical+Key" style="max-width:100%; border-radius:16px;">
            <p>Sam walks to the garden. He sees a small door behind the flowers. The door is green and old. Sam puts the key into the lock. Click! The door opens.</p>
            <p>Behind the door there is a magic garden. The flowers are red, blue, and yellow. A little bird sits on a branch. The bird says, "Hello, Sam! Welcome to the secret garden."</p>
            <p>Sam is happy. He drinks sweet water from a fountain. He plays with the bird. In the evening, Sam returns home. He puts the key in his pocket.</p>
        `;
        loadBook(defaultHtml);
    }

    function renderBooksList() {
        if (!booksListUl) return;
        if (uploadedBooks.length === 0) {
            booksListUl.innerHTML = '<li style="color:#b59773;">📭 Немає збережених книг</li>';
            return;
        }
        booksListUl.innerHTML = uploadedBooks.map(book => `
            <li class="book-item" data-id="${book.id}">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                    <span class="book-name" data-id="${book.id}" style="cursor:pointer; flex:1;">📘 ${escapeHtml(book.name.length>30 ? book.name.slice(0,27)+'...' : book.name)}</span>
                    <button class="icon-btn open-book" data-id="${book.id}">📖</button>
                    <button class="icon-btn delete-book" data-id="${book.id}">🗑️</button>
                </div>
            </li>
        `).join('');
        document.querySelectorAll('.open-book').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                const book = uploadedBooks.find(b => b.id === id);
                if (book) loadBook(book.content);
            });
        });
        document.querySelectorAll('.delete-book').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                uploadedBooks = uploadedBooks.filter(b => b.id !== id);
                localStorage.setItem('reader_books', JSON.stringify(uploadedBooks));
                renderBooksList();
                if (uploadedBooks.length === 0 && allPages.length) loadDefaultBook();
            });
        });
        document.querySelectorAll('.book-name').forEach(name => {
            name.addEventListener('click', () => {
                const id = name.getAttribute('data-id');
                const book = uploadedBooks.find(b => b.id === id);
                if (book) loadBook(book.content);
            });
        });
    }

    function loadUploadedBooks() {
        const saved = localStorage.getItem('reader_books');
        if (saved) {
            try { uploadedBooks = JSON.parse(saved); } catch(e) {}
        }
        renderBooksList();
    }

    function loadSavedBook() {
        const saved = localStorage.getItem('reader_current_book');
        if (saved && saved.trim()) loadBook(saved);
        else loadDefaultBook();
    }

    function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('open'); }
    function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open'); }

    function init() {
        loadUploadedBooks();
        loadVocabulary();
        loadSavedBook();
        
        const savedSound = localStorage.getItem('soundEnabled');
        if (savedSound !== null) soundEnabled = savedSound === 'true';
        soundToggleBtn.innerHTML = soundEnabled ? '🔊 Звук' : '🔇 Звук';
        
        const savedFont = localStorage.getItem('readerFontSize');
        if (savedFont) {
            currentFontSize = parseFloat(savedFont);
            if (isNaN(currentFontSize)) currentFontSize = 1.0;
        }
        updateFontSize();
        
        const savedTheme = localStorage.getItem('darkTheme');
        if (savedTheme === 'true') setTheme(true);
        else setTheme(false);
        
        const savedLast = localStorage.getItem('lastWord');
        const savedPageNum = parseInt(localStorage.getItem('lastWordPage'));
        if (savedLast && !isNaN(savedPageNum)) {
            lastWordText = savedLast;
            lastWordPage = savedPageNum;
        }
        
        soundToggleBtn.addEventListener('click', toggleSound);
        clearVocabBtn.addEventListener('click', clearVocabulary);
        toggleAllWordsBtn.addEventListener('click', toggleShowAllWords);
        lastWordBtn.addEventListener('click', goToLastWord);
        prevBtn.addEventListener('click', prevPage);
        nextBtn.addEventListener('click', nextPage);
        themeToggleBtn.addEventListener('click', toggleTheme);
        increaseFontBtn.addEventListener('click', increaseFont);
        decreaseFontBtn.addEventListener('click', decreaseFont);
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) loadBookFromFile(file);
            fileInput.value = '';
        });
        
        const touchArea = document.getElementById('bookPage');
        touchArea.addEventListener('touchstart', handleTouchStart);
        touchArea.addEventListener('touchend', handleTouchEnd);
        
        window.addEventListener('keydown', handleKeyPress);
        
        if (mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', openSidebar);
            overlay.addEventListener('click', closeSidebar);
        }
        
        tooltip = document.createElement('div');
        tooltip.className = 'word-tooltip';
        tooltip.style.display = 'none';
        document.body.appendChild(tooltip);
        
        window.addEventListener('scroll', () => {
            if (tooltip && tooltip.style.display === 'block' && currentTooltipWord) {
                positionTooltip(currentTooltipWord);
            }
        });
    }
    
    init();
</script>
