<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>LinguaReader – читалка з перекладом та грою</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --light-bg: #f5f0e8;
            --light-surface: #ffffff;
            --light-text: #2c2418;
            --light-text-secondary: #6b5a4a;
            --light-accent: #c8a86b;
            --light-accent-soft: #e8d9c8;
            --light-border: #e2d6c8;
            --light-glow: rgba(200, 168, 107, 0.15);
            --light-btn-text: #2c2418;
            --light-btn-hover: #d4b87a;
            
            --dark-bg: #121212;
            --dark-surface: #1e1e1e;
            --dark-text: #e4e4e4;
            --dark-text-secondary: #b0b0b0;
            --dark-accent: #e2b870;
            --dark-accent-soft: #2a2a2a;
            --dark-border: #3a3a3a;
            --dark-glow: rgba(226, 184, 112, 0.15);
            --dark-btn-text: #e4e4e4;
            --dark-btn-hover: #3a3228;
            
            --radius-card: 28px;
            --radius-element: 20px;
            --radius-btn: 40px;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--light-bg);
            color: var(--light-text);
            transition: var(--transition);
            min-height: 100vh;
            padding: 24px;
        }

        body.dark {
            background: var(--dark-bg);
            color: var(--dark-text);
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--light-accent);
            border-radius: 10px;
        }
        body.dark ::-webkit-scrollbar-thumb {
            background: var(--dark-accent);
        }

        .app-header {
            max-width: 1400px;
            margin: 0 auto 28px auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            padding: 0 8px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .logo {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #d4b27a, #b8925a);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: var(--shadow-sm);
        }
        body.dark .logo {
            background: linear-gradient(135deg, #c9a45c, #b07e42);
        }
        .site-title {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #b8925a, #8b6942);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        body.dark .site-title {
            background: linear-gradient(135deg, #e2b870, #c49a5a);
            -webkit-background-clip: text;
            background-clip: text;
        }
        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .font-controls {
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            padding: 4px 12px;
            border-radius: 50px;
            box-shadow: var(--shadow-sm);
        }
        body.dark .font-controls {
            background: rgba(30, 30, 30, 0.8);
        }
        .font-controls button {
            background: transparent;
            border: none;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--light-text);
        }
        body.dark .font-controls button {
            color: var(--dark-text);
        }
        .font-controls button:hover {
            background: rgba(0, 0, 0, 0.05);
            transform: scale(0.96);
        }
        body.dark .font-controls button:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .control-btn, .file-label, .game-btn, .last-word-top-btn {
            background: var(--light-surface);
            border: 1px solid var(--light-border);
            padding: 10px 20px;
            border-radius: var(--radius-btn);
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            color: var(--light-btn-text);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow-sm);
        }
        body.dark .control-btn, 
        body.dark .file-label, 
        body.dark .game-btn, 
        body.dark .last-word-top-btn {
            background: var(--dark-surface);
            border-color: var(--dark-border);
            color: var(--dark-btn-text);
        }
        .control-btn:hover, .file-label:hover, .game-btn:hover, .last-word-top-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--light-accent);
            background: var(--light-btn-hover);
        }
        body.dark .control-btn:hover, 
        body.dark .file-label:hover, 
        body.dark .game-btn:hover, 
        body.dark .last-word-top-btn:hover {
            border-color: var(--dark-accent);
            background: var(--dark-btn-hover);
            color: var(--dark-accent);
        }
        .reader-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }
        .view-container {
            flex: 3;
            min-width: 280px;
        }
        .book-page {
            background: var(--light-surface);
            border-radius: var(--radius-card);
            padding: 2rem 2.2rem;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: 1.05rem;
            line-height: 1.7;
            text-align: justify;
            transition: var(--transition);
            min-height: 580px;
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }
        body.dark .book-page {
            background: var(--dark-surface);
            color: var(--dark-text);
        }
        .book-page img {
            display: none !important;
        }
        .word {
            display: inline-block;
            cursor: pointer;
            border-radius: 12px;
            padding: 2px 4px;
            margin: 0 -2px;
            font-weight: 500;
            transition: var(--transition);
        }
        .word:hover {
            background-color: var(--light-accent-soft);
        }
        body.dark .word:hover {
            background-color: var(--dark-accent-soft);
        }
        .word-highlight {
            background-color: var(--light-accent) !important;
            color: white !important;
            box-shadow: 0 2px 8px rgba(200, 168, 107, 0.4);
            border-radius: 12px;
        }
        body.dark .word-highlight {
            background-color: var(--dark-accent) !important;
            color: #121212 !important;
        }
        .pagination-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 24px 0;
            flex-wrap: wrap;
        }
        .pagination-controls .control-btn {
            width: 48px;
            height: 48px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .page-indicator {
            background: var(--light-surface);
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--light-border);
            min-width: 120px;
            text-align: center;
        }
        body.dark .page-indicator {
            background: var(--dark-surface);
            border-color: var(--dark-border);
            color: var(--dark-text);
        }
        .upload-area {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 16px;
        }
        input[type="file"] { display: none; }

        /* Сайдбар */
        .sidebar {
            flex: 1;
            min-width: 280px;
            background: var(--light-surface);
            border-radius: var(--radius-card);
            padding: 1.5rem;
            box-shadow: var(--shadow-lg);
            transition: var(--transition);
            height: fit-content;
        }
        body.dark .sidebar {
            background: var(--dark-surface);
        }
        .sidebar h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--light-accent);
        }
        body.dark .sidebar h2 {
            color: var(--dark-accent);
        }
        .vocab-list, .books-list {
            list-style: none;
            max-height: 320px;
            overflow-y: auto;
            margin-top: 0.8rem;
        }
        .vocab-item, .book-item {
            margin: 10px 0;
            padding: 12px;
            border-radius: 20px;
            background: var(--light-bg);
            transition: var(--transition);
        }
        body.dark .vocab-item, body.dark .book-item {
            background: var(--dark-bg);
        }
        .vocab-word {
            font-weight: 700;
            background: var(--light-accent-soft);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
            color: var(--light-text);
        }
        body.dark .vocab-word {
            background: var(--dark-accent-soft);
            color: var(--dark-accent);
        }
        .icon-btn {
            background: var(--light-surface);
            border: 1px solid var(--light-border);
            font-size: 0.9rem;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 30px;
            transition: var(--transition);
            color: var(--light-text);
        }
        body.dark .icon-btn {
            background: var(--dark-surface);
            border-color: var(--dark-border);
            color: var(--dark-text);
        }
        .icon-btn:hover {
            transform: scale(1.05);
            background: var(--light-accent-soft);
            border-color: var(--light-accent);
        }
        body.dark .icon-btn:hover {
            background: var(--dark-accent-soft);
            border-color: var(--dark-accent);
            color: var(--dark-accent);
        }
        .info-note {
            font-size: 0.7rem;
            margin-top: 20px;
            color: var(--light-text-secondary);
            border-top: 1px solid var(--light-border);
            padding-top: 16px;
        }
        body.dark .info-note {
            color: var(--dark-text-secondary);
            border-top-color: var(--dark-border);
        }

        /* Модальне вікно гри */
        .game-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }
        .game-modal.active {
            visibility: visible;
            opacity: 1;
        }
        .game-card {
            background: var(--light-surface);
            border-radius: var(--radius-card);
            width: 90%;
            max-width: 650px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
            text-align: center;
            box-shadow: var(--shadow-lg);
            position: relative;
            transform: scale(0.95);
            transition: transform 0.2s;
        }
        .game-modal.active .game-card {
            transform: scale(1);
        }
        body.dark .game-card {
            background: var(--dark-surface);
            color: var(--dark-text);
        }
        .close-game-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--light-accent-soft);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            color: var(--light-text);
        }
        body.dark .close-game-btn {
            background: var(--dark-accent-soft);
            color: var(--dark-accent);
        }
        .close-game-btn:hover {
            transform: scale(1.1);
        }
        .game-question {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: 'Cormorant Garamond', serif;
            margin: 1.5rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .game-options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin: 2rem 0;
        }
        .option-btn {
            background: var(--light-bg);
            border: 1px solid var(--light-border);
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            min-width: 160px;
            color: var(--light-text);
        }
        body.dark .option-btn {
            background: var(--dark-bg);
            border-color: var(--dark-border);
            color: var(--dark-text);
        }
        .option-btn:hover:not(:disabled) {
            transform: scale(1.02);
            border-color: var(--light-accent);
        }
        body.dark .option-btn:hover:not(:disabled) {
            border-color: var(--dark-accent);
        }
        .option-btn.correct {
            background: #2e7d32 !important;
            color: white !important;
        }
        .option-btn.wrong {
            background: #c62828 !important;
            color: white !important;
        }
        .speak-word-btn {
            background: var(--light-accent-soft);
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 56px;
            font-size: 1.4rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--light-text);
        }
        body.dark .speak-word-btn {
            background: var(--dark-accent-soft);
            color: var(--dark-accent);
        }
        .speak-word-btn:hover {
            transform: scale(1.05);
        }
        .progress-badge {
            display: inline-block;
            background: var(--light-accent-soft);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 16px;
            color: var(--light-text);
        }
        body.dark .progress-badge {
            background: var(--dark-accent-soft);
            color: var(--dark-accent);
        }
        .game-stats {
            font-size: 0.85rem;
            margin-top: 1rem;
            color: var(--light-text-secondary);
        }
        body.dark .game-stats {
            color: var(--dark-text-secondary);
        }
        .word-tooltip {
            position: fixed;
            background: #2d2a24;
            backdrop-filter: blur(20px);
            color: #fff;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.95rem;
            font-weight: 500;
            z-index: 2100;
            pointer-events: none;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 12px 28px rgba(0,0,0,0.3);
            border: 1px solid var(--light-accent);
            white-space: normal;
            max-width: 90vw;
        }
        body.dark .word-tooltip {
            border-color: var(--dark-accent);
        }
        .word-tooltip.hidden { display: none; }
        .toast-message {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e1e;
            backdrop-filter: blur(12px);
            color: white;
            padding: 10px 20px;
            border-radius: 60px;
            z-index: 2200;
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            box-shadow: var(--shadow-lg);
        }

        /* Стиль для кнопки-перемикача перекладу */
        .translation-toggle {
            background: var(--light-surface);
            border: 1px solid var(--light-border);
            padding: 10px 20px;
            border-radius: var(--radius-btn);
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            color: var(--light-btn-text);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow-sm);
        }
        body.dark .translation-toggle {
            background: var(--dark-surface);
            border-color: var(--dark-border);
            color: var(--dark-btn-text);
        }
        .translation-toggle:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--light-accent);
            background: var(--light-btn-hover);
        }
        body.dark .translation-toggle:hover {
            border-color: var(--dark-accent);
            background: var(--dark-btn-hover);
            color: var(--dark-accent);
        }

        @media (max-width: 800px) {
            body { padding: 16px; }
            .sidebar {
                position: fixed;
                top: 0;
                right: -320px;
                width: 300px;
                height: 100%;
                z-index: 1000;
                border-radius: 24px 0 0 24px;
                transition: right 0.3s ease;
            }
            .sidebar.open { right: 0; }
            .sidebar-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.5);
                z-index: 999;
                display: none;
            }
            .sidebar-overlay.open { display: block; }
            .mobile-menu-btn { display: inline-block !important; }
            .game-question { font-size: 2rem; }
            .pagination-controls .control-btn {
                width: 44px;
                height: 44px;
            }
        }
        @media (min-width: 801px) {
            .mobile-menu-btn, .sidebar-overlay { display: none !important; }
        }
    </style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="app-header">
    <div class="logo-area">
        <div class="logo">📖</div>
        <div class="site-title">LinguaReader</div>
    </div>
    <div class="header-controls">
        <div class="font-controls">
            <button id="decreaseFontBtn"><i class="fas fa-minus"></i></button>
            <button id="increaseFontBtn"><i class="fas fa-plus"></i></button>
        </div>
        <button id="themeToggleBtn" class="control-btn"><i class="fas fa-moon"></i> Нічний режим</button>
        <button id="lastWordTopBtn" class="last-word-top-btn"><i class="fas fa-location-dot"></i> Останнє слово</button>
        <!-- НОВА КНОПКА: перемикач показу перекладу -->
        <button id="toggleTranslationBtn" class="translation-toggle"><i class="fas fa-language"></i> Переклад: увімк.</button>
        <button id="mobileMenuBtn" class="mobile-menu-btn control-btn"><i class="fas fa-book-open"></i> Словник</button>
    </div>
</div>

<div class="reader-wrapper">
    <div class="view-container">
        <div id="bookView" class="book-view">
            <div class="book-page" id="bookPage"></div>
            <div class="pagination-controls">
                <button id="prevPageBtn" class="control-btn"><i class="fas fa-chevron-left"></i></button>
                <span id="pageIndicator" class="page-indicator">Сторінка 0 / 0</span>
                <button id="nextPageBtn" class="control-btn"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="upload-area">
                <label class="file-label" for="uploadBook"><i class="fas fa-upload"></i> Книга</label>
                <input type="file" id="uploadBook" accept=".epub,.fb2,.pdf,.txt">
                <button id="soundToggleBtn" class="control-btn"><i class="fas fa-volume-up"></i> Звук</button>
                <button id="gameLaunchBtn" class="game-btn"><i class="fas fa-gamepad"></i> Гра</button>
            </div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div>
            <h2><i class="fas fa-graduation-cap"></i> Мій словничок</h2>
            <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                <button id="clearVocabBtn" class="control-btn" style="padding: 6px 12px;"><i class="fas fa-trash-alt"></i> Очистити</button>
                <button id="toggleAllWordsBtn" class="control-btn" style="padding: 6px 12px;"><i class="fas fa-list"></i> Всі слова</button>
            </div>
            <ul id="vocabularyList" class="vocab-list">
                <li style="color: var(--light-text-secondary);">📖 Натисніть на слово</li>
            </ul>
        </div>
        <div style="margin-top: 24px;">
            <h2><i class="fas fa-layer-group"></i> Мої книги</h2>
            <ul id="booksList" class="books-list">
                <li style="color: var(--light-text-secondary);">📭 Список книг</li>
            </ul>
            <div class="info-note">
                <i class="fas fa-info-circle"></i> Клік на слово → переклад. <br>
                🎮 У грі потрібно 3 правильні відповіді поспіль.
            </div>
        </div>
    </div>
</div>

<!-- Модальне вікно гри -->
<div id="gameModal" class="game-modal">
    <div class="game-card">
        <button class="close-game-btn" id="closeGameBtn"><i class="fas fa-times"></i></button>
        <div class="game-header-btns" style="display: flex; justify-content: center; gap: 12px; margin-bottom: 20px;">
            <button id="refreshGameBtn" class="control-btn"><i class="fas fa-sync-alt"></i> Скинути прогрес</button>
            <button id="gameSoundToggleBtn" class="control-btn"><i class="fas fa-headphones"></i> Звук гри</button>
        </div>
        <h2><i class="fas fa-brain"></i> Вгадай переклад</h2>
        <div class="game-question">
            <span id="gameWordText">---</span>
            <button id="speakGameWordBtn" class="speak-word-btn"><i class="fas fa-volume-up"></i></button>
        </div>
        <div class="game-options" id="gameOptionsContainer"></div>
        <div class="game-status" id="gameStatus"></div>
        <div class="game-stats" id="gameStats"></div>
        <div id="gameProgressInfo" class="progress-badge"></div>
    </div>
</div>

<script>
    (function() {
        if (typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        }
        
        let allPages = [];
        let currentPage = 0;
        let vocabularyHistory = [];
        let translationCache = new Map();
        let soundEnabled = true;
        let gameSoundEnabled = true;
        let currentUtterance = null;
        let showAllWords = false;
        let lastWordText = null;
        let lastWordPageIndex = -1;
        let lastWordPosition = null;
        let uploadedBooks = [];
        let isDarkTheme = false;
        let currentFontSize = 1.0;
        let currentBookId = null;

        // НОВА ЗМІННА: чи показувати переклад
        let showTranslation = true;

        let wordProgress = new Map();
        const NEEDED_CORRECT = 3;
        
        let currentGameWord = null;
        let currentGameTranslation = null;
        let currentGameOptions = [];
        let gameTotalCorrect = 0;
        let waitingForNext = false;
        let autoNextTimeout = null;

        // DOM елементи
        const bookPageDiv = document.getElementById('bookPage');
        const prevBtn = document.getElementById('prevPageBtn');
        const nextBtn = document.getElementById('nextPageBtn');
        const pageIndicator = document.getElementById('pageIndicator');
        const vocabListUl = document.getElementById('vocabularyList');
        const booksListUl = document.getElementById('booksList');
        const fileInput = document.getElementById('uploadBook');
        const soundToggleBtn = document.getElementById('soundToggleBtn');
        const clearVocabBtn = document.getElementById('clearVocabBtn');
        const toggleAllWordsBtn = document.getElementById('toggleAllWordsBtn');
        const lastWordTopBtn = document.getElementById('lastWordTopBtn');
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const increaseFontBtn = document.getElementById('increaseFontBtn');
        const decreaseFontBtn = document.getElementById('decreaseFontBtn');
        const gameLaunchBtn = document.getElementById('gameLaunchBtn');
        const refreshGameBtn = document.getElementById('refreshGameBtn');
        const gameSoundToggleBtn = document.getElementById('gameSoundToggleBtn');
        const gameWordText = document.getElementById('gameWordText');
        const speakGameWordBtn = document.getElementById('speakGameWordBtn');
        const gameOptionsContainer = document.getElementById('gameOptionsContainer');
        const gameStatus = document.getElementById('gameStatus');
        const gameStats = document.getElementById('gameStats');
        const gameProgressInfo = document.getElementById('gameProgressInfo');
        const gameModal = document.getElementById('gameModal');
        const closeGameBtn = document.getElementById('closeGameBtn');
        // Нова кнопка перемикача перекладу
        const toggleTranslationBtn = document.getElementById('toggleTranslationBtn');

        let tooltip = null;
        let tooltipTimeout = null;
        let currentTooltipWordElement = null;
        let touchStartX = 0;
        let touchEndX = 0;

        function showToast(msg, duration = 2000) {
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        }

        function escapeHtml(str) { return (str || '').replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

        function speakWord(word, isGameSound = false) {
            if (isGameSound && !gameSoundEnabled) return;
            if (!isGameSound && !soundEnabled) return;
            if (!window.speechSynthesis) return;
            if (currentUtterance) window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(word);
            utter.lang = 'en-US';
            utter.rate = 0.9;
            window.speechSynthesis.speak(utter);
            currentUtterance = utter;
        }
        function speakCurrentGameWord() { if (currentGameWord) speakWord(currentGameWord, true); }

        function removeAllImagesFromHtml(html) {
            const div = document.createElement('div');
            div.innerHTML = html;
            div.querySelectorAll('img, svg').forEach(el => el.remove());
            return div.innerHTML;
        }

        function splitHtmlIntoPages(html, maxBlocks = 7) {
            let clean = removeAllImagesFromHtml(html);
            const temp = document.createElement('div');
            temp.innerHTML = clean;
            const blocks = [];
            const nodes = [...temp.childNodes];
            for (let node of nodes) {
                if (node.nodeType === Node.TEXT_NODE && node.textContent.trim()) {
                    node.textContent.split(/\n\s*\n/).forEach(p => { if(p.trim()) blocks.push(`<p>${p.trim()}</p>`); });
                } else if (node.nodeType === Node.ELEMENT_NODE && !['SCRIPT','STYLE','IMG'].includes(node.tagName)) {
                    blocks.push(node.outerHTML);
                }
            }
            const pages = [];
            for (let i = 0; i < blocks.length; i += maxBlocks) pages.push(blocks.slice(i, i+maxBlocks).join(''));
            if (!pages.length) pages.push('<p>✨ Сторінка порожня</p>');
            return pages;
        }

        function wrapWordsInHtml(html) {
            const div = document.createElement('div');
            div.innerHTML = html;
            const walk = (node) => {
                if (node.nodeType === Node.TEXT_NODE) {
                    const words = node.textContent.split(/(\b[a-zA-Z'’]+(?:\-[a-zA-Z'’]+)?\b)/g);
                    const frag = document.createDocumentFragment();
                    for (let part of words) {
                        if (part && part.match(/^[a-zA-Z'’]+(?:\-[a-zA-Z'’]+)?$/)) {
                            const span = document.createElement('span');
                            span.className = 'word';
                            span.textContent = part;
                            frag.appendChild(span);
                        } else if (part) frag.appendChild(document.createTextNode(part));
                    }
                    node.parentNode.replaceChild(frag, node);
                } else if (node.nodeType === Node.ELEMENT_NODE && !['IMG','SCRIPT','STYLE'].includes(node.tagName)) {
                    [...node.childNodes].forEach(walk);
                }
            };
            walk(div);
            return div.innerHTML;
        }

        function updateTooltipPosition() {
            if (!tooltip || tooltip.classList.contains('hidden') || !currentTooltipWordElement) return;
            const rect = currentTooltipWordElement.getBoundingClientRect();
            const tRect = tooltip.getBoundingClientRect();
            let top = rect.top - tRect.height - 12;
            if (top < 10) top = rect.bottom + 12;
            let left = rect.left + (rect.width/2) - (tRect.width/2);
            left = Math.max(12, Math.min(left, window.innerWidth - tRect.width - 12));
            tooltip.style.top = `${top}px`;
            tooltip.style.left = `${left}px`;
        }
        function showTooltip(wordElement, text, autoHide = true) {
            if (!tooltip) { tooltip = document.createElement('div'); tooltip.className = 'word-tooltip hidden'; document.body.appendChild(tooltip); }
            if (tooltipTimeout) clearTimeout(tooltipTimeout);
            tooltip.innerHTML = text;
            tooltip.classList.remove('hidden');
            currentTooltipWordElement = wordElement;
            updateTooltipPosition();
            if (autoHide) tooltipTimeout = setTimeout(() => { tooltip.classList.add('hidden'); currentTooltipWordElement = null; }, 3500);
        }
        function hideTooltip() { if(tooltip) tooltip.classList.add('hidden'); if(tooltipTimeout) clearTimeout(tooltipTimeout); currentTooltipWordElement = null; }

        function highlightWordByPosition(pos) {
            const spans = document.querySelectorAll('#bookPage .word');
            if (pos !== null && spans[pos]) {
                spans[pos].scrollIntoView({ behavior: 'smooth', block: 'center' });
                spans[pos].classList.add('word-highlight');
                setTimeout(() => spans[pos].classList.remove('word-highlight'), 1500);
                return true;
            }
            return false;
        }

        function render() {
            if (!allPages.length) {
                bookPageDiv.innerHTML = '<p style="text-align:center; padding: 40px;">📘 Немає відкритої книги<br>Завантажте книгу</p>';
                pageIndicator.innerText = `Сторінка 0 / 0`;
                return;
            }
            bookPageDiv.innerHTML = wrapWordsInHtml(allPages[currentPage]);
            pageIndicator.innerText = `Сторінка ${currentPage+1} / ${allPages.length}`;
            attachListeners();
            bookPageDiv.scrollTop = 0;
            if (lastWordText && currentPage === lastWordPageIndex && lastWordPosition !== null) setTimeout(() => highlightWordByPosition(lastWordPosition), 200);
        }
        function attachListeners() {
            document.querySelectorAll('#bookPage .word').forEach(span => {
                span.removeEventListener('click', wordClickHandler);
                span.addEventListener('click', wordClickHandler);
            });
        }

        async function fetchTranslation(word) {
            const lower = word.toLowerCase();
            if (translationCache.has(lower)) return translationCache.get(lower);
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=uk&dt=t&q=${encodeURIComponent(word)}`;
                const resp = await fetch(url);
                if (resp.ok) {
                    const data = await resp.json();
                    if (data?.[0]?.[0]?.[0]) {
                        let trans = data[0][0][0];
                        translationCache.set(lower, trans);
                        return trans;
                    }
                }
            } catch(e) {}
            const fallback = "❓ (немає перекладу)";
            translationCache.set(lower, fallback);
            return fallback;
        }

        async function wordClickHandler(e) {
            const span = e.currentTarget;
            const word = span.innerText.trim();
            if (!word.match(/^[a-zA-Z'’]+(?:\-[a-zA-Z'’]+)?$/)) return;
            const allWords = Array.from(document.querySelectorAll('#bookPage .word'));
            const wordIndex = allWords.indexOf(span);
            
            // Якщо показ перекладу вимкнено — показуємо сповіщення, але слово все одно додаємо до словника і озвучуємо (опціонально)
            if (!showTranslation) {
                showTooltip(span, `🔇 Переклад вимкнено. Увімкніть кнопкою.`, true);
                // Все одно додаємо слово в словник для подальшого вивчення, але переклад не показуємо активно
                // Проте щоб додати, треба отримати переклад. Але оскільки користувач не бачить — можна все одно додати в фоні.
                let translation = await fetchTranslation(word);
                addOrUpdateWord(word, translation);
                if (soundEnabled) speakWord(word, false);
                span.classList.add('word-highlight');
                setTimeout(() => span.classList.remove('word-highlight'), 600);
                lastWordText = word; lastWordPageIndex = currentPage; lastWordPosition = wordIndex;
                localStorage.setItem('lastWord', word); localStorage.setItem('lastWordPage', currentPage); localStorage.setItem('lastWordPosition', wordIndex);
                return;
            }
            
            // Нормальний режим (переклад увімкнено)
            showTooltip(span, `⏳...`, false);
            let translation = await fetchTranslation(word);
            if (translation.includes("❓")) translation = `❓ (немає перекладу)`;
            showTooltip(span, translation, true);
            addOrUpdateWord(word, translation);
            if (soundEnabled) speakWord(word, false);
            span.classList.add('word-highlight');
            setTimeout(() => span.classList.remove('word-highlight'), 600);
            lastWordText = word; lastWordPageIndex = currentPage; lastWordPosition = wordIndex;
            localStorage.setItem('lastWord', word); localStorage.setItem('lastWordPage', currentPage); localStorage.setItem('lastWordPosition', wordIndex);
        }

        function goToLastWord() {
            if (!lastWordText) { showToast("⚠️ Немає останнього слова"); return; }
            if (!allPages.length) { showToast("⚠️ Немає відкритої книги"); return; }
            if (currentPage === lastWordPageIndex && lastWordPosition !== null && highlightWordByPosition(lastWordPosition)) {
                showToast(`📍 "${lastWordText}"`); return;
            }
            if (lastWordPageIndex !== -1 && lastWordPageIndex < allPages.length) {
                currentPage = lastWordPageIndex;
                render();
                setTimeout(() => { if(lastWordPosition !== null) highlightWordByPosition(lastWordPosition); showToast(`📍 "${lastWordText}"`); }, 200);
            } else showToast(`⚠️ Слово "${lastWordText}" не знайдено`);
        }

        function nextPage() { if(currentPage+1 < allPages.length) { currentPage++; render(); hideTooltip(); } else showToast("Остання сторінка"); }
        function prevPage() { if(currentPage-1 >= 0) { currentPage--; render(); hideTooltip(); } else showToast("Перша сторінка"); }

        function handleTouchStart(e) { touchStartX = e.changedTouches[0].screenX; }
        function handleTouchEnd(e) { touchEndX = e.changedTouches[0].screenX; const delta = touchEndX - touchStartX; if(Math.abs(delta) > 50) delta > 0 ? prevPage() : nextPage(); }
        function handleKeyPress(e) { if(e.key === 'ArrowLeft') { prevPage(); e.preventDefault(); } else if(e.key === 'ArrowRight') { nextPage(); e.preventDefault(); } }

        function updateFontSize() { const container = document.querySelector('.book-page'); if(container) container.style.fontSize = currentFontSize + 'rem'; localStorage.setItem('readerFontSize', currentFontSize); }
        function increaseFont() { if(currentFontSize < 2.2) { currentFontSize += 0.1; updateFontSize(); } else showToast("Максимальний шрифт"); }
        function decreaseFont() { if(currentFontSize > 0.7) { currentFontSize -= 0.1; updateFontSize(); } else showToast("Мінімальний шрифт"); }

        function setTheme(dark) {
            isDarkTheme = dark;
            if(dark) { 
                document.body.classList.remove('light'); 
                document.body.classList.add('dark'); 
                themeToggleBtn.innerHTML = '<i class="fas fa-sun"></i> Світла тема';
            } else { 
                document.body.classList.remove('dark'); 
                document.body.classList.add('light'); 
                themeToggleBtn.innerHTML = '<i class="fas fa-moon"></i> Нічний режим';
            }
            localStorage.setItem('darkTheme', dark);
        }
        function toggleTheme() { setTheme(!isDarkTheme); }
        function toggleSound() { soundEnabled = !soundEnabled; soundToggleBtn.innerHTML = soundEnabled ? '<i class="fas fa-volume-up"></i> Звук' : '<i class="fas fa-volume-mute"></i> Звук'; if(!soundEnabled && window.speechSynthesis) window.speechSynthesis.cancel(); localStorage.setItem('soundEnabled', soundEnabled); }
        function toggleGameSound() { gameSoundEnabled = !gameSoundEnabled; gameSoundToggleBtn.innerHTML = gameSoundEnabled ? '<i class="fas fa-headphones"></i> Звук гри' : '<i class="fas fa-headphones-slash"></i> Звук гри'; if(!gameSoundEnabled) window.speechSynthesis.cancel(); }
        
        // Нова функція: перемикання показу перекладу
        function toggleTranslationMode() {
            showTranslation = !showTranslation;
            const icon = showTranslation ? '<i class="fas fa-language"></i> Переклад: увімк.' : '<i class="fas fa-language"></i> Переклад: вимк.';
            toggleTranslationBtn.innerHTML = icon;
            localStorage.setItem('showTranslation', showTranslation);
            showToast(showTranslation ? "🔓 Показ перекладу увімкнено" : "🔒 Показ перекладу вимкнено");
        }

        function saveVocabulary() {
            localStorage.setItem('reader_vocabulary', JSON.stringify(vocabularyHistory));
            const progressObj = {}; for(let [word, data] of wordProgress.entries()) progressObj[word] = { consecutiveCorrect: data.consecutiveCorrect, isLearned: data.isLearned };
            localStorage.setItem('wordProgress', JSON.stringify(progressObj));
        }
        function loadVocabulary() {
            const saved = localStorage.getItem('reader_vocabulary');
            if(saved) { try { const parsed = JSON.parse(saved); if(Array.isArray(parsed)) vocabularyHistory = parsed; } catch(e){} }
            const savedProgress = localStorage.getItem('wordProgress');
            if(savedProgress) { try { const progressObj = JSON.parse(savedProgress); for(let [word, data] of Object.entries(progressObj)) wordProgress.set(word, { consecutiveCorrect: data.consecutiveCorrect || 0, isLearned: data.isLearned || false }); } catch(e){} }
            renderVocabularyList();
        }
        function addOrUpdateWord(word, translation) {
            const idx = vocabularyHistory.findIndex(i => i.word.toLowerCase() === word.toLowerCase());
            if(idx !== -1) { vocabularyHistory[idx].translation = translation; const item = vocabularyHistory.splice(idx,1)[0]; vocabularyHistory.unshift(item); }
            else { vocabularyHistory.unshift({ word, translation }); if(!wordProgress.has(word)) wordProgress.set(word, { consecutiveCorrect: 0, isLearned: false }); }
            translationCache.set(word.toLowerCase(), translation);
            saveVocabulary();
            renderVocabularyList();
        }
        function editTranslation(word, currentTranslation, index) {
            const newTranslation = prompt(`Редагувати переклад для "${word}":`, currentTranslation);
            if(newTranslation && newTranslation.trim()) { vocabularyHistory[index].translation = newTranslation.trim(); translationCache.set(word.toLowerCase(), newTranslation.trim()); saveVocabulary(); renderVocabularyList(); showToast(`Переклад "${word}" оновлено`); }
        }
        function renderVocabularyList() {
            if(!vocabListUl) return;
            let items = showAllWords ? vocabularyHistory : (vocabularyHistory.length ? [vocabularyHistory[0]] : []);
            if(items.length === 0) { vocabListUl.innerHTML = '<li style="color: var(--light-text-secondary);">📖 Натисніть на слово</li>'; return; }
            vocabListUl.innerHTML = items.map((item, idx) => {
                const globalIdx = vocabularyHistory.findIndex(v => v.word === item.word);
                const progress = wordProgress.get(item.word);
                let progressText = progress ? (progress.isLearned ? ' ✓ ВИВЧЕНО' : ` (${progress.consecutiveCorrect}/${NEEDED_CORRECT})`) : '';
                return `<li class="vocab-item"><div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;"><span class="vocab-word">${escapeHtml(item.word)}${progressText}</span><span style="font-size:0.85rem; flex:1;">${escapeHtml(item.translation)}</span><button class="icon-btn edit-vocab" data-word="${escapeHtml(item.word)}" data-index="${globalIdx}"><i class="fas fa-edit"></i></button><button class="icon-btn retry-vocab" data-word="${escapeHtml(item.word)}"><i class="fas fa-sync-alt"></i></button><button class="icon-btn remove-vocab" data-word="${escapeHtml(item.word)}"><i class="fas fa-trash-alt"></i></button></div></li>`;
            }).join('');
            document.querySelectorAll('.edit-vocab').forEach(btn => btn.addEventListener('click', async (e) => { e.stopPropagation(); const w=btn.getAttribute('data-word'); const idx=parseInt(btn.getAttribute('data-index')); const item=vocabularyHistory[idx]; if(item) editTranslation(w, item.translation, idx); }));
            document.querySelectorAll('.retry-vocab').forEach(btn => btn.addEventListener('click', async (e) => { e.stopPropagation(); const w=btn.getAttribute('data-word'); const newTrans=await fetchTranslation(w); addOrUpdateWord(w, newTrans); renderVocabularyList(); showToast(`Переклад "${w}" оновлено`); }));
            document.querySelectorAll('.remove-vocab').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); const w=btn.getAttribute('data-word'); vocabularyHistory = vocabularyHistory.filter(v => v.word !== w); translationCache.delete(w.toLowerCase()); wordProgress.delete(w); saveVocabulary(); renderVocabularyList(); showToast(`"${w}" видалено`); if(gameModal.classList.contains('active')) refreshGame(); }));
        }
        function clearVocabulary() { vocabularyHistory = []; translationCache.clear(); wordProgress.clear(); saveVocabulary(); renderVocabularyList(); showToast("Словник очищено"); if(gameModal.classList.contains('active')) refreshGame(); }
        function toggleShowAllWords() { showAllWords = !showAllWords; toggleAllWordsBtn.innerHTML = showAllWords ? '<i class="fas fa-eye-slash"></i> Приховати' : '<i class="fas fa-list"></i> Всі слова'; renderVocabularyList(); }

        // Парсинг книг
        async function parseEpub(file) { return new Promise((resolve, reject) => { const reader = new FileReader(); reader.onload = async (e) => { try { const book = ePub(e.target.result); await book.ready; const spine = book.spine; let html = ''; for(let item of spine.spineItems || []) { try { const doc = await item.load(book.load.bind(book)); const body = doc.querySelector('body'); if(body) { const clone = body.cloneNode(true); clone.querySelectorAll('img').forEach(i=>i.remove()); html += clone.innerHTML; } item.unload(); } catch(e){} } resolve(html); } catch(err){ reject(err); } }; reader.onerror=reject; reader.readAsArrayBuffer(file); }); }
        async function parseFb2(file) { return new Promise((resolve, reject) => { const reader = new FileReader(); reader.onload = (e) => { try { const xml=e.target.result; const doc=new DOMParser().parseFromString(xml,'text/xml'); const body=doc.querySelector('body'); if(!body) reject("No body"); let html=''; const process=(n)=>{ if(n.nodeType===Node.ELEMENT_NODE){ if(n.tagName==='p'){ html+='<p>'; n.childNodes.forEach(process); html+='</p>'; return; } if(n.tagName==='title'){ html+='<h2>'; n.childNodes.forEach(process); html+='</h2>'; return; } n.childNodes.forEach(process); } else if(n.nodeType===Node.TEXT_NODE) html+=n.textContent; }; body.childNodes.forEach(process); resolve(html); } catch(err){ reject(err); } }; reader.onerror=reject; reader.readAsText(file,'utf-8'); }); }
        async function parsePdf(file) { return new Promise((resolve, reject) => { const reader = new FileReader(); reader.onload = async (e) => { try { const pdf = await pdfjsLib.getDocument({ data: e.target.result }).promise; let text=''; for(let i=1;i<=pdf.numPages;i++){ const page=await pdf.getPage(i); const content=await page.getTextContent(); const pageText=content.items.map(item=>item.str).join(' '); if(pageText.trim()) text+=`<p>${escapeHtml(pageText)}</p>`; } resolve(text||'<p>⚠️ Немає тексту</p>'); } catch(err){ reject(err); } }; reader.onerror=reject; reader.readAsArrayBuffer(file); }); }
        async function loadBookFromFile(file) {
            const ext = file.name.split('.').pop().toLowerCase(); let html = ''; showToast("Завантаження...");
            try { if(ext==='epub') html = await parseEpub(file); else if(ext==='fb2') html = await parseFb2(file); else if(ext==='pdf') html = await parsePdf(file); else if(ext==='txt') { const text = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsText(file,'UTF-8'); }); html = text.split('\n').map(l=>l.trim()?`<p>${escapeHtml(l)}</p>`:'<br>').join(''); } else throw new Error("Формат не підтримується");
                if(!html.trim()) html="<p>⚠️ Не вдалося витягнути текст</p>";
                const id = Date.now()+'-'+Math.random().toString(36).substr(2,6);
                uploadedBooks.unshift({ id, name: file.name, content: html });
                localStorage.setItem('reader_books', JSON.stringify(uploadedBooks));
                renderBooksList();
                openBook(id);
            } catch(err) { showToast("Помилка: "+err.message); }
        }
        function openBook(bookId) {
            const book = uploadedBooks.find(b=>b.id===bookId); if(!book) return;
            currentBookId=bookId; allPages=splitHtmlIntoPages(book.content,7); currentPage=0; lastWordPosition=null; lastWordPageIndex=-1; lastWordText=null; render();
            localStorage.setItem('reader_current_book', book.content); localStorage.setItem('reader_current_book_id', bookId); showToast(`Відкрито: ${book.name}`);
        }
        function loadDefaultBook() { const defaultHtml = `<h2>The Lost Key</h2><p>Sam is a boy. He lives in a small house near the forest. One sunny morning, Sam finds an old key under a big tree. The key is gold and very beautiful.</p><p>"What does this key open?" Sam asks himself.</p><p>Sam walks to the garden. He sees a small door behind the flowers. The door is green and old. Sam puts the key into the lock. Click! The door opens.</p><p>Behind the door there is a magic garden. The flowers are red, blue, and yellow. A little bird sits on a branch. The bird says, "Hello, Sam! Welcome to the secret garden."</p><p>Sam is happy. He drinks sweet water from a fountain. He plays with the bird. In the evening, Sam returns home. He puts the key in his pocket.</p>`;
            allPages = splitHtmlIntoPages(defaultHtml,7); currentPage=0; render(); }
        function renderBooksList() {
            if(!booksListUl) return;
            if(uploadedBooks.length===0){ booksListUl.innerHTML='<li style="color: var(--light-text-secondary);">📭 Немає збережених книг</li>'; return; }
            booksListUl.innerHTML = uploadedBooks.map(book => `<li class="book-item"><div style="display:flex; justify-content:space-between; align-items:center;"><span class="book-name" data-id="${book.id}" style="cursor:pointer; flex:1;">📘 ${escapeHtml(book.name.length>30?book.name.slice(0,27)+'...':book.name)}</span><button class="icon-btn open-book" data-id="${book.id}"><i class="fas fa-folder-open"></i></button><button class="icon-btn delete-book" data-id="${book.id}"><i class="fas fa-trash-alt"></i></button></div></li>`).join('');
            document.querySelectorAll('.open-book').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); openBook(btn.getAttribute('data-id')); }));
            document.querySelectorAll('.delete-book').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); const id=btn.getAttribute('data-id'); const name=uploadedBooks.find(b=>b.id===id)?.name; uploadedBooks=uploadedBooks.filter(b=>b.id!==id); localStorage.setItem('reader_books',JSON.stringify(uploadedBooks)); if(currentBookId===id){ if(uploadedBooks.length) openBook(uploadedBooks[0].id); else loadDefaultBook(); } renderBooksList(); showToast(`Книгу "${name}" видалено`); }));
            document.querySelectorAll('.book-name').forEach(name=>name.addEventListener('click',()=>openBook(name.getAttribute('data-id'))));
        }
        function loadUploadedBooks() { const saved = localStorage.getItem('reader_books'); if(saved) try { uploadedBooks = JSON.parse(saved); } catch(e){ uploadedBooks=[]; } renderBooksList(); }
        function loadSavedBook() { const savedId = localStorage.getItem('reader_current_book_id'); if(savedId && uploadedBooks.find(b=>b.id===savedId)) openBook(savedId); else if(uploadedBooks.length) openBook(uploadedBooks[0].id); else loadDefaultBook(); const savedLast=localStorage.getItem('lastWord'); if(savedLast) lastWordText=savedLast; const savedPage=localStorage.getItem('lastWordPage'); if(savedPage) lastWordPageIndex=parseInt(savedPage); const savedPos=localStorage.getItem('lastWordPosition'); if(savedPos) lastWordPosition=parseInt(savedPos); }

        // Ігрова логіка
        function updateGameStatsDisplay() { const learned = Array.from(wordProgress.values()).filter(p=>p.isLearned).length; gameStats.innerHTML = `<i class="fas fa-check-circle"></i> Правильних: ${gameTotalCorrect}  |  <i class="fas fa-star"></i> Вивчено: ${learned}/${vocabularyHistory.length}`; }
        function getWordsNeedingPractice() { return vocabularyHistory.filter(item => { const p = wordProgress.get(item.word); return !p || !p.isLearned; }); }
        function getRandomWordFromVocabulary() { const needs = getWordsNeedingPractice(); if(!needs.length) return null; const valid = needs.filter(i=>i.translation && !i.translation.includes("❓") && i.translation.trim()); if(!valid.length) return null; return valid[Math.floor(Math.random()*valid.length)]; }
        function generateOptions(correct, trans) { let opts = [trans]; const others = vocabularyHistory.filter(i=>i.word!==correct && i.translation && !i.translation.includes("❓") && i.translation!==trans); const shuffled = [...others]; for(let i=shuffled.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]; } for(let i=0;i<Math.min(3,shuffled.length);i++) opts.push(shuffled[i].translation); while(opts.length<4) opts.push("(новий переклад)"); for(let i=opts.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [opts[i],opts[j]]=[opts[j],opts[i]]; } return opts.slice(0,4); }
        function enableGameButtons(enabled) { document.querySelectorAll('.option-btn').forEach(btn=>{ if(enabled) { btn.disabled=false; btn.style.pointerEvents='auto'; } else { btn.disabled=true; btn.style.pointerEvents='none'; } }); }
        function updateProgressInfo() { if(currentGameWord){ const p=wordProgress.get(currentGameWord); if(p?.isLearned) gameProgressInfo.innerHTML = `✅ "${currentGameWord}" вивчено!`; else gameProgressInfo.innerHTML = `📈 Прогрес: ${p?.consecutiveCorrect||0}/${NEEDED_CORRECT} правильних поспіль`; } else gameProgressInfo.innerHTML=''; }
        function loadNewGameWord() { if(autoNextTimeout) clearTimeout(autoNextTimeout); const needs=getWordsNeedingPractice(); if(needs.length===0){ gameWordText.innerText="🎉 ВІТАЄМО! 🎉"; gameOptionsContainer.innerHTML='<div style="padding:20px;">Ви вивчили всі слова!</div>'; gameStatus.innerText="Ви молодець! Читайте далі."; gameProgressInfo.innerHTML="🏆 Всі слова вивчені! 🏆"; speakGameWordBtn.style.display='none'; waitingForNext=false; return; } const wordItem=getRandomWordFromVocabulary(); if(!wordItem) return; currentGameWord=wordItem.word; currentGameTranslation=wordItem.translation; currentGameOptions=generateOptions(currentGameWord, currentGameTranslation); gameWordText.innerText=currentGameWord; speakGameWordBtn.style.display='inline-flex'; gameOptionsContainer.innerHTML=''; currentGameOptions.forEach(opt=>{ const btn=document.createElement('button'); btn.className='option-btn'; btn.innerText=opt; btn.addEventListener('click',()=>handleGameAnswer(btn,opt)); gameOptionsContainer.appendChild(btn); }); gameStatus.innerText="Оберіть правильний переклад!"; waitingForNext=false; enableGameButtons(true); updateProgressInfo(); if(gameSoundEnabled && currentGameWord) setTimeout(()=>speakWord(currentGameWord,true),300); }
        function handleGameAnswer(btn, selected) { if(waitingForNext) return; const isCorrect = (selected === currentGameTranslation); let progress = wordProgress.get(currentGameWord); if(!progress) { progress={ consecutiveCorrect:0, isLearned:false }; wordProgress.set(currentGameWord,progress); } if(isCorrect){ progress.consecutiveCorrect++; gameTotalCorrect++; if(progress.consecutiveCorrect>=NEEDED_CORRECT){ progress.isLearned=true; gameStatus.innerText=`✅ ВІДМІННО! Слово "${currentGameWord}" вивчено!`; showToast(`🎉 Слово "${currentGameWord}" вивчено!`); } else gameStatus.innerText=`✅ Правильно! Залишилось ${NEEDED_CORRECT-progress.consecutiveCorrect} правильних поспіль`; btn.classList.add('correct'); } else { const old=progress.consecutiveCorrect; progress.consecutiveCorrect=0; gameStatus.innerText=`❌ Помилка! Скинуто (було ${old}/3). Правильно: "${currentGameTranslation}"`; btn.classList.add('wrong'); document.querySelectorAll('.option-btn').forEach(el=>{ if(el.innerText===currentGameTranslation) el.classList.add('correct'); }); } updateGameStatsDisplay(); saveVocabulary(); waitingForNext=true; enableGameButtons(false); autoNextTimeout=setTimeout(()=>loadNewGameWord(),2200); }
        function refreshGame() { if(autoNextTimeout) clearTimeout(autoNextTimeout); wordProgress.clear(); for(let item of vocabularyHistory) wordProgress.set(item.word,{ consecutiveCorrect:0, isLearned:false }); gameTotalCorrect=0; saveVocabulary(); updateGameStatsDisplay(); loadNewGameWord(); showToast("Прогрес гри скинуто!"); }
        
        function showGameModal() { 
            if(autoNextTimeout) clearTimeout(autoNextTimeout);
            updateGameStatsDisplay(); 
            loadNewGameWord(); 
            gameModal.classList.add('active'); 
        }
        function hideGameModal() { 
            if(autoNextTimeout) clearTimeout(autoNextTimeout);
            gameModal.classList.remove('active'); 
        }

        function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('open'); }
        function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open'); }

        function init() {
            loadUploadedBooks(); loadVocabulary(); loadSavedBook();
            // Завантаження налаштування показу перекладу
            const savedShowTranslation = localStorage.getItem('showTranslation');
            if (savedShowTranslation !== null) showTranslation = savedShowTranslation === 'true';
            toggleTranslationBtn.innerHTML = showTranslation ? '<i class="fas fa-language"></i> Переклад: увімк.' : '<i class="fas fa-language"></i> Переклад: вимк.';
            
            const savedSound = localStorage.getItem('soundEnabled'); if(savedSound !== null) soundEnabled = savedSound === 'true'; soundToggleBtn.innerHTML = soundEnabled ? '<i class="fas fa-volume-up"></i> Звук' : '<i class="fas fa-volume-mute"></i> Звук';
            const savedFont = localStorage.getItem('readerFontSize'); if(savedFont) { currentFontSize = parseFloat(savedFont); if(isNaN(currentFontSize)) currentFontSize=1.0; } updateFontSize();
            const savedTheme = localStorage.getItem('darkTheme'); if(savedTheme === 'true') setTheme(true); else setTheme(false);
            soundToggleBtn.addEventListener('click', toggleSound); clearVocabBtn.addEventListener('click', clearVocabulary); toggleAllWordsBtn.addEventListener('click', toggleShowAllWords); lastWordTopBtn.addEventListener('click', goToLastWord); prevBtn.addEventListener('click', prevPage); nextBtn.addEventListener('click', nextPage); themeToggleBtn.addEventListener('click', toggleTheme); increaseFontBtn.addEventListener('click', increaseFont); decreaseFontBtn.addEventListener('click', decreaseFont);
            fileInput.addEventListener('change', (e) => { if(e.target.files[0]) loadBookFromFile(e.target.files[0]); fileInput.value=''; });
            const touchArea = document.getElementById('bookPage'); if(touchArea){ touchArea.addEventListener('touchstart', handleTouchStart); touchArea.addEventListener('touchend', handleTouchEnd); }
            window.addEventListener('keydown', handleKeyPress);
            if(mobileMenuBtn) mobileMenuBtn.addEventListener('click', openSidebar); if(overlay) overlay.addEventListener('click', closeSidebar);
            const scrollContainer = document.getElementById('bookPage'); if(scrollContainer) scrollContainer.addEventListener('scroll', () => { if(tooltip && !tooltip.classList.contains('hidden') && currentTooltipWordElement) updateTooltipPosition(); });
            window.addEventListener('scroll', () => { if(tooltip && !tooltip.classList.contains('hidden') && currentTooltipWordElement) updateTooltipPosition(); });
            window.addEventListener('resize', () => { if(tooltip && !tooltip.classList.contains('hidden') && currentTooltipWordElement) updateTooltipPosition(); });
            gameLaunchBtn.addEventListener('click', showGameModal); 
            closeGameBtn.addEventListener('click', hideGameModal);
            refreshGameBtn.addEventListener('click', refreshGame); 
            gameSoundToggleBtn.addEventListener('click', toggleGameSound); 
            speakGameWordBtn.addEventListener('click', speakCurrentGameWord);
            // Нова подія для кнопки перемикача перекладу
            toggleTranslationBtn.addEventListener('click', toggleTranslationMode);
            tooltip = document.createElement('div'); tooltip.className = 'word-tooltip hidden'; document.body.appendChild(tooltip);
        }
        init();
    })();
</script>
</body>
